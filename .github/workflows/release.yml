name: release

# Build cross-platform binaries and attach them to a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          name="punch_${ver}_${GOOS}_${GOARCH}"
          mkdir -p dist
          make release-build VERSION="${VERSION}" GOOS="${GOOS}" GOARCH="${GOARCH}" OUT="dist/punch"
          tar -C dist -czf "dist/${name}.tar.gz" punch
          rm -f dist/punch
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          # Combine the per-asset checksums into a single SHA256SUMS file.
          find artifacts -name '*.sha256' -exec cat {} \; > release/SHA256SUMS
          # Ship the installer alongside the binaries so the README one-liner
          # can fetch it from the release.
          cp install.sh release/install.sh
          ls -l release

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/SHA256SUMS
            release/install.sh
          generate_release_notes: true
